name: Configure Branch Protection

# One-shot setup workflow. Run manually after merging the PR that introduces
# pr-title-lint.yml so GitHub has already seen the check name "lint-pr-title".
on:
  workflow_dispatch:

permissions: {}

jobs:
  configure:
    runs-on: ubuntu-latest
    permissions:
      administration: write
    steps:
      - name: Apply repository and branch protection settings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          token = os.environ["GH_TOKEN"]
          repo  = os.environ["REPO"]
          base  = "https://api.github.com"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }

          def api(method, path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              req  = urllib.request.Request(f"{base}{path}", data=data, headers=headers, method=method)
              with urllib.request.urlopen(req) as r:
                  print(f"{method} {path} -> {r.status}")

          # Squash-only merges; PR title becomes the commit message on main.
          # delete_branch_on_merge keeps the repo tidy after each squash.
          api("PATCH", f"/repos/{repo}", {
              "allow_squash_merge":          True,
              "allow_merge_commit":          False,
              "allow_rebase_merge":          False,
              "squash_merge_commit_title":   "PR_TITLE",
              "squash_merge_commit_message": "BLANK",
              "delete_branch_on_merge":      True,
          })

          # Branch protection for main:
          #   - PR required before merging (0 approvals — solo project)
          #   - lint-pr-title check must pass
          #   - branch must be up to date with main before merging
          #   - no force-pushes or deletions
          #   - enforce_admins: false preserves an emergency escape hatch;
          #     set to true to enforce for everyone including admins
          api("PUT", f"/repos/{repo}/branches/main/protection", {
              "required_status_checks": {
                  "strict":   True,
                  "contexts": ["lint-pr-title"],
              },
              "enforce_admins": False,
              "required_pull_request_reviews": {
                  "dismiss_stale_reviews":          False,
                  "required_approving_review_count": 0,
              },
              "restrictions":      None,
              "allow_force_pushes": False,
              "allow_deletions":    False,
          })
          EOF
