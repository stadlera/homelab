name: Terraform CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'terraform/**'

permissions:
  contents: read

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: '~1.9'
      - name: tofu fmt
        run: tofu fmt -check -recursive terraform/

  validate-plan:
    name: validate + plan (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        module: [cloudflare, networking, proxmox, tailscale]
      fail-fast: false
    defaults:
      run:
        working-directory: terraform/${{ matrix.module }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: '~1.9'
      - name: Check for .tf files
        id: has_tf
        run: |
          if ls *.tf 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No .tf files found — skipping init/validate/plan"
          fi
      - name: tofu init
        if: steps.has_tf.outputs.exists == 'true'
        run: tofu init -backend=false
      - name: tofu validate
        if: steps.has_tf.outputs.exists == 'true'
        run: tofu validate
      - name: tofu plan
        if: steps.has_tf.outputs.exists == 'true'
        run: tofu plan -refresh=false -input=false

  comment:
    name: Post PR summary
    needs: [fmt, validate-plan]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post summary comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          VP_RESULT: ${{ needs.validate-plan.result }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const icon = (r) => ({ success: '✅', failure: '❌', skipped: '⏭️' }[r] ?? '❓');
            const fmt = process.env.FMT_RESULT;
            const vp  = process.env.VP_RESULT;

            const body = [
              '## Terraform CI',
              '',
              '| Job | Result |',
              '|---|---|',
              `| fmt | ${icon(fmt)} ${fmt} |`,
              `| validate + plan | ${icon(vp)} ${vp} |`,
              '',
              `[Full run output](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
