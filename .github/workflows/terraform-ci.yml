name: Terraform CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'terraform/**'

permissions:
  contents: read

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '~1.9'
      - name: tofu fmt
        run: tofu fmt -check -recursive terraform/

  validate-plan:
    name: validate + plan (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        module: [cloudflare, networking, proxmox, tailscale]
      fail-fast: false
    defaults:
      run:
        working-directory: terraform/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '~1.9'
      - name: Check for .tf files
        id: has_tf
        run: |
          if ls *.tf 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No .tf files found — skipping init/validate/plan"
          fi
      - name: tofu init
        if: steps.has_tf.outputs.exists == 'true'
        run: tofu init -backend=false
      - name: tofu validate
        if: steps.has_tf.outputs.exists == 'true'
        run: tofu validate
      - name: tofu plan
        if: steps.has_tf.outputs.exists == 'true'
        run: tofu plan -refresh=false -input=false

  comment:
    name: Post PR summary
    needs: [fmt, validate-plan]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          VP_RESULT: ${{ needs.validate-plan.result }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const icon = (r) => ({ success: '✅', failure: '❌', skipped: '⏭️' }[r] ?? '❓');
            const fmt = process.env.FMT_RESULT;
            const vp  = process.env.VP_RESULT;

            const body = [
              '## Terraform CI',
              '',
              '| Job | Result |',
              '|---|---|',
              `| fmt | ${icon(fmt)} ${fmt} |`,
              `| validate + plan | ${icon(vp)} ${vp} |`,
              '',
              `[Full run output](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('## Terraform CI')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
