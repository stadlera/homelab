name: Ansible Lint

on:
  pull_request:

permissions: {}

jobs:
  changes:
    uses: ./.github/workflows/changes-gate.yml
    permissions:
      pull-requests: read
    with:
      filters: |
        src:
          - 'ansible/**'
          - '.ansible-lint'

  ansible-lint:
    needs: changes
    if: needs.changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ansible-lint
        run: pip install ansible-lint==24.12.2

      - name: Run ansible-lint
        run: |
          if ! find ansible/ \( -name "*.yml" -o -name "*.yaml" \) | grep -q .; then
            echo "No YAML files in ansible/ — nothing to lint."
            exit 0
          fi
          ansible-lint ansible/
