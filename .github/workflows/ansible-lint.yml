name: Ansible Lint

on:
  pull_request:

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ansible: ${{ steps.filter.outputs.ansible }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            ansible:
              - 'ansible/**'
              - '.ansible-lint'

  ansible-lint:
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install ansible-lint
        run: pip install ansible-lint==24.12.2

      - name: Run ansible-lint
        run: |
          if ! find ansible/ \( -name "*.yml" -o -name "*.yaml" \) | grep -q .; then
            echo "No YAML files in ansible/ — nothing to lint."
            exit 0
          fi
          ansible-lint ansible/
