name: Renovate

on:
  schedule:
    - cron: "0 5 * * 5" # 05:00 UTC every Friday
  workflow_dispatch: {}  # allow ad-hoc runs for testing

permissions: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
