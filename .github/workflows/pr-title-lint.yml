name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          APPROVED_TYPES="feat|fix|chore|docs|ci|refactor|security"

          # Required format: type[!]: description  (scope is not allowed)
          # type must be one of the approved keywords; breaking ! is optional.
          APPROVED_PATTERN="^(${APPROVED_TYPES})!?:[[:space:]].+"

          if ! echo "$PR_TITLE" | grep -qE "$APPROVED_PATTERN"; then
            echo "ERROR: PR title does not match the required format."
            echo ""
            echo "  Required: type[!]: short description"
            echo "  Approved types: feat  fix  chore  docs  ci  refactor  security"
            echo "  Breaking:       feat!: drop support for X"
            echo ""
            echo "  Got: ${PR_TITLE}"
            exit 1
          fi

          echo "OK: PR title format is valid."
