name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          APPROVED_TYPES="feat|fix|chore|docs|ci|refactor|security"

          # Required: type[(scope)][!]: description
          # Plain-text titles without a type prefix are not accepted.
          APPROVED_PATTERN="^(${APPROVED_TYPES})(\([^)]+\))?!?:[[:space:]].+"

          if ! echo "$PR_TITLE" | grep -qE "$APPROVED_PATTERN"; then
            echo "ERROR: PR title does not match the required format."
            echo ""
            echo "  Required: type[(scope)][!]: short description"
            echo "  Approved types: feat  fix  chore  docs  ci  refactor  security"
            echo "  Examples:"
            echo "    feat: add snapcast role"
            echo "    fix(ansible): correct vault path"
            echo "    feat!: drop Python 2 support"
            echo "    refactor(terraform)!: rename all modules"
            echo ""
            echo "  Got: ${PR_TITLE}"
            exit 1
          fi

          echo "OK: PR title format is valid."
